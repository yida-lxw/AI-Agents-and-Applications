<p><strong>罗贝托·因凡特</strong><strong>(R</strong><strong><span class="small-caps">oberto</span></strong><strong> I</strong><strong><span class="small-caps">nfante)</span></strong>是一位拥有超过25年经验的软件工程师，主要深耕于金融领域——涵盖投资银行、资产管理公司、经纪商和交易所。他目前负责一家对冲基金资金管理部门的量化开发工作，同时主导多个生成式人工智能项目。Roberto 是《构建以太坊去中心化应用》一书的作者。<span class="aframe-location"></span></p>
