<h1 class="readable-text-h1"><span class="chapter-title-text">关于封面插图</span></h1>
</div>
<div class="readable-text" id="p2">
<p>《AI Agents and Applications》封面上的插图是“Djiebedji, ou officier des munitionnaires”，意为“Djiebedji，或一名弹药军官”，取自《土耳其服饰画册》（乔治·阿伦茨收藏，纽约公共图书馆，1808–1826年）。</p>
</div>
<div class="readable-text intended-text" id="p3">
<p>在那个年代，人们很容易通过衣着判断出他们的居住地、职业或社会地位。曼宁出版社以几个世纪前丰富多彩的地域文化为基础设计书籍封面，以此颂扬计算机行业的创造力和进取精神，这些文化通过类似这样的收藏图片得以重现生机。</p>
</div>
